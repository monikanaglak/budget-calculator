<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Skarbonka</title>
</head>
<body>
    <div class="container">
    <header>
        <p class="logo">Sknerus</p>
        <div class="local-date">
          <p>Today we are</p>
          <p class="actual-date"></p>
        </div>
        
        <div class="days">
          <p>Days left to the next salary</p>
          <p class="days-left"></p>
        </div>
        
        <p class="money-left">Money left : 0 €</p>
    </header>
    <div class="wrapper">
    <h1>Finance Logger</h1>

    <!-- output list -->
    <ul class="item-list">
      
    </ul>
  
    <main>

        <article class="informations">
            <form class="new-item-form">
                <div class="field">
                  <label>Type:</label>
                  <select id="type">
                    <option value="invoice">Invoice</option>
                    <option value="payment">Payment</option>
                  </select>
                </div>
                <div class="field">
                  <label>To / From:</label>
                  <input type="text" id="tofrom">
                </div>   
                <div class="field">
                  <label>Details:</label>
                  <input type="text" id="details">
                </div>
                <div class="field">
                  <label>Amount (E):</label>
                  <input type="number" id="amount">
                </div>
                <button>Add</button>
              </form>
        </article>
    </main>
  </div>
<script src="app.js"></script>
</body>
</html>
